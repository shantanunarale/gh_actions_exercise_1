name: lint_test_job
on:  
  push:
    paths-ignore: 
      - '.github/workflows/*'

jobs:
  lint_job:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: echo "Running Lint"

  test_job:
    runs-on: ubuntu-latest
    needs: lint_job

    steps:
      - name: Get Code
        uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm ci

      - name: Run Test
        run: echo "Running Test"

  deploy_job:
    runs-on: ubuntu-latest
    needs: test_job


    steps:
      - name: Get Code
        uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm ci

      - name: Deploy job
        run: echo "Deploy Done..."



